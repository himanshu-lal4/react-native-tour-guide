<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <style>
    /* ---- npm call-to-action (install bar + footer CTA) ---- */
    .npm-cta-bar {
      background: #1a1a1a;
      border-bottom: 3px solid #cb3837;
      padding: 14px 0;
    }
    .npm-cta-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .npm-cta-left {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      min-width: 0;
    }
    .npm-cta-label {
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .npm-cta-cmd {
      background: #000;
      color: #7ee787;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 7px 11px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow-x: auto;
      max-width: 100%;
      white-space: nowrap;
    }
    .npm-cta-copy {
      background: #2d2d2d;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s ease, color .15s ease;
    }
    .npm-cta-copy:hover { background: #3d3d3d; color: #fff; }
    .npm-cta-right { display: flex; gap: 8px; flex-wrap: wrap; }
    .npm-cta-btn {
      display: inline-block;
      padding: 8px 15px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none !important;
      border: 1px solid #444;
      color: #eee;
      background: #2d2d2d;
      white-space: nowrap;
      transition: filter .15s ease;
    }
    .npm-cta-btn:hover { filter: brightness(1.25); color: #fff; }
    .npm-cta-btn-primary {
      background: #cb3837;
      border-color: #cb3837;
      color: #fff;
    }

    /* ---- footer CTA ---- */
    .npm-foot-cta {
      background: #f6f8fa;
      border-top: 1px solid #e1e4e8;
      padding: 44px 0 40px;
      text-align: center;
    }
    .npm-foot-cta h2 { margin: 0 0 8px; font-size: 26px; }
    .npm-foot-cta p.npm-foot-tag { margin: 0 auto 20px; color: #57606a; max-width: 620px; }
    .npm-foot-cta pre {
      display: inline-block;
      text-align: left;
      background: #1a1a1a;
      color: #7ee787;
      border-radius: 8px;
      padding: 14px 18px;
      margin: 0 0 20px;
      max-width: 100%;
      overflow-x: auto;
      font-size: 14px;
    }
    .npm-foot-links { margin: 0 0 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .npm-foot-badges img { margin: 0 4px; vertical-align: middle; }

    @media (max-width: 700px) {
      .npm-cta-inner { flex-direction: column; align-items: stretch; }
      .npm-cta-right { justify-content: stretch; }
      .npm-cta-right .npm-cta-btn { flex: 1; text-align: center; }
      .npm-cta-cmd { font-size: 12px; }
    }
  </style>
</head>
