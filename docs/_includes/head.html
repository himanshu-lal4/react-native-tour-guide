<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">

  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">

  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <style>
    /* ===== Force light mode ===== */
    :root {
      --ink: #1f2328;
      --ink-soft: #57606a;
      --line: #e1e4e8;
      --surface: #f6f8fa;
      --npm: #cb3837;
      --npm-dark: #b02f2e;
      --code-green: #116329;
    }
    html { color-scheme: light; }
    body { color: var(--ink); background: #fff; }

    /* ---- Custom site header / nav ---- */
    .site-header-custom {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .site-header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px 20px;
      padding: 14px 0;
    }
    .site-brand {
      font-weight: 800;
      font-size: 1.15rem;
      color: var(--ink) !important;
      text-decoration: none !important;
      white-space: nowrap;
    }
    .site-brand:hover { color: var(--npm) !important; }
    .site-nav-custom {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 6px;
    }
    .site-nav-custom .nav-link {
      color: var(--ink-soft) !important;
      text-decoration: none !important;
      font-size: 0.92rem;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      transition: background .12s ease, color .12s ease;
    }
    .site-nav-custom .nav-link:hover { color: var(--ink) !important; background: var(--surface); }
    .site-nav-custom .nav-link.is-active { color: var(--npm) !important; background: #fdecec; }

    /* ---- npm install bar ---- */
    .npm-cta-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 12px 0;
    }
    .npm-cta-inner {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 10px 14px;
    }
    .npm-cta-left { display: flex; align-items: center; flex-wrap: wrap; gap: 8px 10px; min-width: 0; }
    .npm-cta-label { font-weight: 700; font-size: 0.9rem; color: var(--ink); white-space: nowrap; }
    .npm-cta-cmd {
      background: #fff; color: var(--code-green);
      border: 1px solid var(--line); border-radius: 6px;
      padding: 7px 11px; font-size: 0.82rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow-x: auto; max-width: 100%; white-space: nowrap;
    }
    .npm-cta-copy {
      background: #fff; color: var(--ink); border: 1px solid var(--line);
      border-radius: 6px; padding: 7px 12px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: background .12s ease;
    }
    .npm-cta-copy:hover { background: var(--surface); }
    .npm-cta-right { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ---- Buttons (bar + footer). !important beats minima's link color. ---- */
    .npm-cta-btn {
      display: inline-block; padding: 8px 15px; border-radius: 6px;
      font-size: 0.88rem; font-weight: 700;
      text-decoration: none !important;
      border: 1px solid var(--line);
      color: var(--ink) !important; background: #fff;
      white-space: nowrap; transition: background .12s ease, border-color .12s ease;
    }
    .npm-cta-btn:hover { background: var(--surface); border-color: #d0d7de; color: var(--ink) !important; }
    .npm-cta-btn-primary { background: var(--npm); border-color: var(--npm); color: #fff !important; }
    .npm-cta-btn-primary:hover { background: var(--npm-dark); border-color: var(--npm-dark); color: #fff !important; }

    /* ---- Footer CTA ---- */
    .npm-foot-cta {
      background: var(--surface); border-top: 1px solid var(--line);
      padding: 44px 0 40px; text-align: center;
    }
    .npm-foot-cta h2 { margin: 0 0 8px; font-size: 1.6rem; color: var(--ink); }
    .npm-foot-cta p.npm-foot-tag { margin: 0 auto 20px; color: var(--ink-soft); max-width: 620px; }
    .npm-foot-cta pre {
      display: inline-block; text-align: left;
      background: #fff; color: var(--code-green);
      border: 1px solid var(--line); border-radius: 8px;
      padding: 13px 18px; margin: 0 0 20px; max-width: 100%; overflow-x: auto; font-size: 0.9rem;
    }
    .npm-foot-links { margin: 0 0 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .npm-foot-badges img { margin: 0 4px; vertical-align: middle; }

    /* ---- Site footer author link ---- */
    .site-footer-author a { color: var(--npm) !important; font-weight: 600; text-decoration: none !important; }
    .site-footer-author a:hover { text-decoration: underline !important; }

    @media (max-width: 700px) {
      .npm-cta-inner { flex-direction: column; align-items: stretch; }
      .npm-cta-right { justify-content: stretch; }
      .npm-cta-right .npm-cta-btn { flex: 1; text-align: center; }
      .site-header-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
