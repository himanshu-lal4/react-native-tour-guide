# GitHub Pages (Jekyll) config — zero build step, native GH Pages support.
# Enable at: repo Settings → Pages → Source: Deploy from a branch → main / docs

title: React Native Tour Guide
tagline: Spotlight tours, walkthroughs & coach marks for React Native
description: >-
  A lightweight React Native library for app tours, walkthroughs, onboarding
  flows, and coach marks. Auto shape-matching spotlight, smart auto-scroll,
  themeable tooltips. Works with Expo and React Native CLI — zero native
  dependencies, TypeScript, New Architecture ready.

# IMPORTANT: set this to your published GitHub Pages URL once live.
url: "https://himanshu-lal4.github.io"
baseurl: "/react-native-tour-guide"

author: Himanshu Lal
lang: en_US

theme: minima

plugins:
  - jekyll-seo-tag      # emits <title>, meta description, Open Graph, Twitter cards, JSON-LD
  - jekyll-sitemap      # auto-generates /sitemap.xml for crawlers & answer engines

# Surfaced by jekyll-seo-tag into social/OG cards
logo: https://raw.githubusercontent.com/himanshu-lal4/react-native-tour-guide/main/IOSDemo.gif
twitter:
  card: summary_large_image

# Search-engine ownership verification (emitted as <meta> by jekyll-seo-tag).
# Google Search Console powers Google AI Overviews + Gemini grounding.
# Bing (add its token here if not importing from Google) powers ChatGPT Search + Copilot.
webmaster_verifications:
  google: 4dJ-yl_lAXmI27TlOseUbiBvmPjTlE7wWhdGVnvTZss

# Repo/npm links used across pages
repo_url: https://github.com/himanshu-lal4/react-native-tour-guide
npm_url: https://www.npmjs.com/package/@wrack/react-native-tour-guide

# Drives the npm CTA bar + footer CTA rendered on every page by _layouts/default.html
npm_install: "npm install @wrack/react-native-tour-guide react-native-svg"
npm_badge_slug: "%40wrack%2Freact-native-tour-guide"   # URL-encoded for shields.io
github_slug: "himanshu-lal4/react-native-tour-guide"

# GitHub profile the footer author name links to
author_url: https://github.com/himanshu-lal4

# Curated short nav labels (custom header.html reads these, not header_pages)
nav_links:
  - label: Get Started
    url: /getting-started/
  - label: App Tour
    url: /react-native-app-tour/
  - label: Walkthrough
    url: /react-native-walkthrough/
  - label: Coach Marks
    url: /react-native-coach-marks/
  - label: Onboarding
    url: /react-native-onboarding-tutorial/
  - label: FAQ
    url: /faq/

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
